<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Exams - IT College</title>

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&family=Inter:wght@400;500;600&display=swap"
        rel="stylesheet">

    <!-- Icons & Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">

    <style>
        :root {
            --font-heading: 'Plus Jakarta Sans', sans-serif;
            --font-body: 'Inter', sans-serif;
            --sidebar-width: 280px;
            --sidebar-bg: #0f172a;
            --accent-primary: #6366f1;
            --bg-light: #f8fafc;
            --text-dark: #1e293b;
        }

        body {
            font-family: var(--font-body);
            background-color: var(--bg-light);
            display: flex;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* Sidebar Styling */
        .sidebar {
            width: var(--sidebar-width);
            background-color: var(--sidebar-bg);
            color: #94a3b8;
            position: fixed;
            top: 0;
            bottom: 0;
            left: 0;
            z-index: 1000;
            padding: 1.5rem 1rem;
            display: flex;
            flex-direction: column;
            transition: transform 0.3s ease;
        }

        .brand-section {
            padding: 0 0.75rem 2rem;
            display: flex;
            align-items: center;
            gap: 0.75rem;
            color: white;
            font-family: var(--font-heading);
            font-weight: 700;
            letter-spacing: -0.5px;
        }

        .brand-icon {
            background: linear-gradient(135deg, #a855f7, #7e22ce);
        }

        .nav-section {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
            flex: 1;
        }

        .nav-item-link {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            padding: 0.75rem 1rem;
            border-radius: 0.5rem;
            color: #94a3b8;
            text-decoration: none;
            font-weight: 500;
            transition: all 0.2s;
        }

        .nav-item-link:hover,
        .nav-item-link.active {
            background: rgba(255, 255, 255, 0.1);
            color: white;
        }

        .nav-item-link.active {
            background: var(--accent-primary);
            box-shadow: 0 4px 12px rgba(99, 102, 241, 0.3);
        }

        /* Main Content */
        .main-content {
            margin-left: var(--sidebar-width);
            flex: 1;
            padding: 2rem;
            width: calc(100% - var(--sidebar-width));
        }

        /* Page Header */
        .page-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
        }

        .page-title h1 {
            font-family: var(--font-heading);
            font-weight: 700;
            font-size: 1.75rem;
            color: var(--text-dark);
            margin: 0;
        }

        .search-wrapper {
            position: relative;
            max-width: 300px;
            width: 100%;
        }

        .search-icon {
            position: absolute;
            left: 12px;
            top: 50%;
            transform: translateY(-50%);
            color: #94a3b8;
        }

        .search-input {
            width: 100%;
            padding: 0.6rem 1rem 0.6rem 2.5rem;
            border-radius: 0.5rem;
            border: 1px solid #cbd5e1;
            outline: none;
            transition: all 0.2s;
        }

        .search-input:focus {
            border-color: var(--accent-primary);
            box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.1);
        }

        /* Exam Cards */
        .exam-card {
            background: white;
            border: 1px solid #e2e8f0;
            border-radius: 1rem;
            height: 100%;
            transition: all 0.2s;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .exam-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.05);
            border-color: var(--accent-primary);
        }

        .card-header-img {
            height: 60px;
            background: linear-gradient(135deg, #6366f1, #3b82f6);
            display: flex;
            align-items: flex-end;
            padding: 0 1.5rem;
        }

        .card-icon-circle {
            width: 48px;
            height: 48px;
            background: white;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--accent-primary);
            font-size: 1.5rem;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.05);
            margin-bottom: -24px;
        }

        .card-body-custom {
            padding: 2.5rem 1.5rem 1.5rem;
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        .exam-card-title {
            font-family: var(--font-heading);
            font-weight: 700;
            font-size: 1.1rem;
            margin-bottom: 0.5rem;
            color: var(--text-dark);
        }

        .exam-meta-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 0.75rem;
            margin-top: auto;
            margin-bottom: 1.25rem;
        }

        .meta-tag {
            background: #f1f5f9;
            color: #475569;
            font-size: 0.75rem;
            font-weight: 500;
            padding: 0.35rem 0.5rem;
            border-radius: 0.375rem;
            display: flex;
            align-items: center;
            gap: 0.35rem;
        }

        @media (max-width: 991px) {
            .sidebar {
                transform: translateX(-100%);
            }

            .main-content {
                margin-left: 0;
                width: 100%;
            }
        }
    </style>
</head>

<body>
    <!-- Sidebar -->
    <nav class="sidebar">
        <div class="brand-section">
            <div class="brand-icon rounded p-1">
                <i class="bi bi-mortarboard-fill fs-4 text-white"></i>
            </div>
            <span>IT College<br><small class="fw-normal opacity-75" style="font-size: 0.7rem">Student
                    Portal</small></span>
        </div>

        <div class="nav-section">
            <a href="/frontend/index.html" class="nav-item-link">
                <i class="bi bi-grid-1x2-fill"></i>
                <span>Dashboard</span>
            </a>
            <a href="/frontend/exams.html" class="nav-item-link active">
                <i class="bi bi-file-earmark-text-fill"></i>
                <span>My Exams</span>
            </a>
            <a href="/frontend/results.html" class="nav-item-link">
                <i class="bi bi-trophy-fill"></i>
                <span>Results</span>
            </a>
            <a href="/frontend/profile.html" class="nav-item-link">
                <i class="bi bi-person-circle"></i>
                <span>My Profile</span>
            </a>
        </div>

        <div class="mt-auto">
            <a href="#" class="nav-item-link text-danger" onclick="logout()">
                <i class="bi bi-box-arrow-right"></i>
                <span>Sign Out</span>
            </a>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="main-content">
        <div id="alert-container"></div>

        <div class="page-header">
            <div class="page-title">
                <h1>My Exams</h1>
                <p class="text-secondary mb-0">Select an assessment to begin</p>
            </div>
            <div class="search-wrapper">
                <i class="bi bi-search search-icon"></i>
                <input type="text" class="search-input" id="searchInput" placeholder="Search exams...">
            </div>
        </div>

        <!-- Exam Grid -->
        <div id="exams-container" class="row g-4">
            <div class="col-12 text-center py-5">
                <div class="spinner-border text-primary" role="status"></div>
                <p class="text-muted mt-2">Loading available exams...</p>
            </div>
        </div>
    </main>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/static/js/api.js"></script>
    <script src="/static/js/app.js"></script>
    <script>
        async function loadExams() {
            if (!utils.isAuthenticated()) {
                window.location.href = '/frontend/login.html';
                return;
            }

            try {
                const examsData = await API.exams.list();
                const examsList = examsData.results || examsData;
                window.allExams = examsList; // Store for filtering

                renderExams(examsList);

                document.getElementById('searchInput').addEventListener('input', (e) => {
                    const term = e.target.value.toLowerCase();
                    const filtered = window.allExams.filter(ex =>
                        ex.title.toLowerCase().includes(term) ||
                        (ex.description && ex.description.toLowerCase().includes(term))
                    );
                    renderExams(filtered);
                });

            } catch (error) {
                console.error('Error loading exams:', error);
                document.getElementById('exams-container').innerHTML =
                    '<div class="col-12"><div class="alert alert-danger">Failed to load exams. Please try refreshing.</div></div>';
            }
        }

        function renderExams(exams) {
            const container = document.getElementById('exams-container');

            if (exams.length === 0) {
                container.innerHTML = `
                    <div class="col-12 text-center py-5">
                        <div class="bg-white rounded border p-5 d-inline-block">
                            <i class="bi bi-inbox fs-1 text-secondary mb-3 d-block"></i>
                            <h5 class="text-dark">No exams available</h5>
                            <p class="text-secondary small mb-0">Check back later for new assessments.</p>
                        </div>
                    </div>`;
                return;
            }

            container.innerHTML = exams.map(exam => {
                // Determine Status & Action
                let statusBadge = '';
                let actionBtn = '';
                const win = exam.availability_window || { is_open: true };
                const studentStatus = exam.student_status || 'not_started';

                // Status Badge Logic
                if (studentStatus === 'submitted' || studentStatus === 'graded') {
                    statusBadge = `<div class="meta-tag bg-success bg-opacity-10 text-success"><i class="bi bi-check-circle-fill"></i> Completed</div>`;
                    actionBtn = `<a href="/frontend/results.html" class="btn btn-outline-success w-100 fw-medium rounded-pill py-2">View Results</a>`;
                } else if (studentStatus === 'in_progress') {
                    statusBadge = `<div class="meta-tag bg-warning bg-opacity-10 text-warning"><i class="bi bi-play-circle-fill"></i> In Progress</div>`;
                    actionBtn = `<button onclick="startExam(${exam.id})" class="btn btn-warning w-100 fw-medium rounded-pill py-2 text-white">Resume Exam</button>`;
                } else if (win.is_open) {
                    statusBadge = `<div class="meta-tag bg-primary bg-opacity-10 text-primary"><i class="bi bi-unlock-fill"></i> Open</div>`;
                    actionBtn = `<button onclick="startExam(${exam.id})" class="btn btn-primary w-100 fw-medium rounded-pill py-2">Start Exam <i class="bi bi-arrow-right ms-2"></i></button>`;
                } else {
                    // Locked / Future / Past
                    const isFuture = new Date(win.start_date) > new Date();
                    const label = isFuture ? `Opens ${new Date(win.start_date).toLocaleDateString()}` : 'Closed';
                    statusBadge = `<div class="meta-tag bg-secondary bg-opacity-10 text-secondary"><i class="bi bi-lock-fill"></i> ${label}</div>`;
                    actionBtn = `<button disabled class="btn btn-secondary w-100 fw-medium rounded-pill py-2 opacity-50">${label}</button>`;
                }

                return `
                <div class="col-md-6 col-lg-4">
                    <div class="exam-card">
                        <div class="card-header-img">
                            <div class="card-icon-circle">
                                <i class="bi bi-pencil-square"></i>
                            </div>
                        </div>
                        <div class="card-body-custom">
                            <div class="d-flex justify-content-between align-items-start mb-2">
                                <h5 class="exam-card-title mb-0 me-2">${exam.title}</h5>
                                ${statusBadge}
                            </div>
                            
                            <p class="text-secondary small mb-4" style="display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; min-height: 2.5em;">
                                ${exam.description || 'No description provided.'}
                            </p>
                            
                            <div class="exam-meta-grid">
                                <div class="meta-tag">
                                    <i class="bi bi-clock"></i> ${exam.duration_minutes}m
                                </div>
                                <div class="meta-tag">
                                    <i class="bi bi-check-circle"></i> Pass: ${exam.passing_score}%
                                </div>
                                <div class="meta-tag">
                                    <i class="bi bi-list-check"></i> ${exam.question_count || '?'} Qs
                                </div>
                            </div>
                            
                            <div class="mt-3">
                                ${actionBtn}
                            </div>
                        </div>
                    </div>
                </div>
            `}).join('');
        }

        function startExam(id) {
            window.location.href = `/frontend/exam.html?exam_id=${id}`;
        }

        function logout() {
            if (window.utils && window.utils.logout) utils.logout();
        }

        document.addEventListener('DOMContentLoaded', loadExams);
    </script>
</body>

</html>
